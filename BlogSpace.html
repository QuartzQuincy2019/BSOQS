<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="./css/general.css" />
    <link rel="stylesheet" type="text/css" href="./css/calendar.css" />
    <link rel="stylesheet" type="text/css" href="./css/blocks.css" />
    <link rel="stylesheet" type="text/css" href="./css/candy.css" />
    <link rel="icon" href="./data/icon/QS.png" />
    <!-- DEFAULT THEME -->
    <link id="ThemeController" rel="stylesheet" type="text/css" href="./css/themes/bright.css" />
    <title>QK's Blog Space</title>
    <script type="text/javascript" src="./js/plugins/mjd.js">
    </script>

    <script src="./js/plugins/tyme.min.js"></script>
</head>

<body>
    <div id="MarqueeArea">
        <!-- <input id="DateTimeSelector" type="datetime-local" min="0001-01-01T00:00" value="2026-01-01T00:00" />
        <button value="ToNow" onclick="toNowCalendar();">ToNow</button> -->
        <div id="Calendar">
            <table id="ComprehensiveTimeTable">
                <tr>
                    <td>公历</td>
                    <td id="Solar"></td>
                    <td>农历</td>
                    <td id="Lunar"></td>
                    <td>星期</td>
                    <td id="Week"></td>
                    <td>日序</td>
                    <td id="YearIndex"></td>
                </tr>
                <tr>
                    <td>三柱</td>
                    <td id="ThreePillars" colspan="7"></td>
                </tr>
                <tr>
                    <td>月相</td>
                    <td id="Phase"></td>
                    <td>节气</td>
                    <td id="TermDay"></td>
                    <td colspan="2">物候</td>
                    <td id="Phenology" colspan="2"></td>
                </tr>
                <tr>
                    <td>星宿</td>
                    <td id="28Star"></td>
                    <td>九野</td>
                    <td id="Land"></td>
                    <td colspan="2">建除十二值神</td>
                    <td id="Duty" colspan="2"></td>
                </tr>
                <tr>
                    <td>星座</td>
                    <td id="Constellation"></td>
                    <td>值日胎神</td>
                    <td id="FetusDay"></td>
                    <td colspan="2">黄道黑道神煞</td>
                    <td id="TwelveStar" colspan="2"></td>
                </tr>
                <tr>
                    <td>宜</td>
                    <td id="Recommends" colspan="7"></td>
                </tr>
                <tr>
                    <td>忌</td>
                    <td id="Taboos" colspan="7"></td>
                </tr>
                <tr>
                    <td>八字</td>
                    <td id="EightChar" colspan="7"></td>
                </tr>
                <tr>
                    <td>九星</td>
                    <td id="NineStar" colspan="7"></td>
                </tr>
            </table>
        </div>
        <p id="ClockArea"><span id="Julian"></span> <span id="Clock"></span></p>
    </div>
    <hr class="body_hr2" />
    <hr class="body_hr1" />
    <div id="BlogSpace"></div>
    <div id="pageButtonArea"></div>
    <div id="PageInfo"></div>
    <!-- --------------------------------------------- -->
    <script type="text/javascript" src="./js/database.js">
    </script>
    <script type="text/javascript" src="./blogs/blogs.js">
    </script>
    <script type="text/javascript" src="./js/bop.js">
    </script>
    <script type="text/javascript" src="./js/logic.js">
    </script>
    <script type="text/javascript" src="./js/generate.js">
    </script>
    <script type="text/javascript" src="./js/po.js">
    </script>
    <script type="text/javascript" src="./js/calentime.js">
    </script>
    <script type="text/javascript" src="./js/themes.js">
    </script>
    <!-- blogs -->
</body>

</html>
